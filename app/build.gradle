plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.winwinwin'
    compileSdk 36

    defaultConfig {
        applicationId 'com.example.winwinwin'
        minSdk 26
        targetSdk 35
        versionCode 1
        versionName '1.0'
    }

    buildTypes {
        debug {
            minifyEnabled false
            debuggable true
        }
        release {
            minifyEnabled false
            signingConfig signingConfigs.debug
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    packagingOptions {
        resources {
            excludes += ['/META-INF/{AL2.0,LGPL2.1}']
        }
        jniLibs {
            useLegacyPackaging true
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
    // GeckoView — Firefox engine with full Web Speech API / TTS support
    implementation 'org.mozilla.geckoview:geckoview-omni:151.0.20260601110758'
}
